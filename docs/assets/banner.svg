<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 220">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="fileOk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#475569"/>
      <stop offset="100%" stop-color="#64748b"/>
    </linearGradient>
    <!-- Glow filter for the bolt -->
    <filter id="boltGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Subtle glow for the safe file -->
    <filter id="safeGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Shield clip -->
    <clipPath id="shieldClip">
      <path d="M960,45 L1000,55 L1000,95 Q1000,120 960,135 Q920,120 920,95 L920,55 Z"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="220" fill="url(#bg)" rx="6"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="0" x2="0" y2="220" stroke="#e2e8f0" stroke-width="1"/>
    <line x1="60" y1="0" x2="60" y2="220" stroke="#e2e8f0" stroke-width="1"/>
    <line x1="120" y1="0" x2="120" y2="220" stroke="#e2e8f0" stroke-width="1"/>
    <line x1="180" y1="0" x2="180" y2="220" stroke="#e2e8f0" stroke-width="1"/>
    <line x1="240" y1="0" x2="240" y2="220" stroke="#e2e8f0" stroke-width="1"/>
    <line x1="0" y1="55" x2="1200" y2="55" stroke="#e2e8f0" stroke-width="1"/>
    <line x1="0" y1="110" x2="1200" y2="110" stroke="#e2e8f0" stroke-width="1"/>
    <line x1="0" y1="165" x2="1200" y2="165" stroke="#e2e8f0" stroke-width="1"/>
  </g>

  <!-- LEFT SIDE: Title and description -->
  <text x="50" y="72" fill="#e2e8f0" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="34" font-weight="700" letter-spacing="-0.5">atomic-jsonwrite</text>
  <text x="50" y="104" fill="#94a3b8" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="15" font-weight="400">Crash-safe JSON persistence with fsync + atomic replace</text>

  <!-- Status pills -->
  <g transform="translate(50, 124)">
    <!-- PYTHON pill -->
    <rect x="0" y="0" width="68" height="22" rx="4" fill="#1e3a5f" opacity="0.7"/>
    <text x="34" y="15" fill="#94a3b8" font-family="'Segoe UI',monospace" font-size="10" font-weight="600" text-anchor="middle">PYTHON</text>
    <!-- ZERO DEPS pill -->
    <rect x="78" y="0" width="80" height="22" rx="4" fill="#1e3a5f" opacity="0.7"/>
    <text x="118" y="15" fill="#94a3b8" font-family="'Segoe UI',monospace" font-size="10" font-weight="600" text-anchor="middle">ZERO DEPS</text>
    <!-- MIT pill -->
    <rect x="168" y="0" width="42" height="22" rx="4" fill="#1e3a5f" opacity="0.7"/>
    <text x="189" y="15" fill="#94a3b8" font-family="'Segoe UI',monospace" font-size="10" font-weight="600" text-anchor="middle">MIT</text>
  </g>

  <!-- Bottom tag -->
  <text x="50" y="195" fill="#475569" font-family="'Segoe UI',monospace" font-size="11">protectyr-labs/atomic-jsonwrite</text>

  <!-- RIGHT SIDE: Crash scenario visualization -->

  <!-- === SCENE: Write -> Crash -> File Still Valid === -->

  <!-- Step 1: File being written (left of scene) -->
  <g transform="translate(620, 40)">
    <!-- File icon with write cursor -->
    <rect x="0" y="0" width="48" height="60" rx="3" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
    <!-- Folded corner -->
    <path d="M36,0 L48,12 L36,12 Z" fill="#334155" stroke="#475569" stroke-width="1"/>
    <!-- JSON lines being written -->
    <rect x="8" y="20" width="28" height="3" rx="1" fill="#34d399" opacity="0.8"/>
    <rect x="8" y="27" width="22" height="3" rx="1" fill="#34d399" opacity="0.6"/>
    <rect x="8" y="34" width="26" height="3" rx="1" fill="#34d399" opacity="0.4"/>
    <!-- Blinking cursor -->
    <rect x="8" y="41" width="2" height="8" rx="1" fill="#34d399" opacity="0.9">
      <animate attributeName="opacity" values="0.9;0.2;0.9" dur="1.2s" repeatCount="indefinite"/>
    </rect>
    <!-- Label -->
    <text x="24" y="78" fill="#94a3b8" font-family="'Segoe UI',sans-serif" font-size="9" text-anchor="middle" font-weight="500">WRITING</text>
  </g>

  <!-- Arrow 1 -->
  <g transform="translate(680, 65)">
    <line x1="0" y1="0" x2="40" y2="0" stroke="#475569" stroke-width="1.5" stroke-dasharray="4,3"/>
    <polygon points="40,-4 48,0 40,4" fill="#475569"/>
  </g>

  <!-- Step 2: Lightning bolt (crash event) -->
  <g transform="translate(738, 28)" filter="url(#boltGlow)">
    <!-- Lightning bolt -->
    <path d="M20,0 L8,30 L18,30 L6,55 L30,22 L19,22 L30,0 Z" fill="url(#bolt)" opacity="0.95"/>
    <!-- Small spark particles -->
    <circle cx="4" cy="20" r="1.5" fill="#fbbf24" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0;0.6" dur="0.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="32" cy="35" r="1" fill="#fbbf24" opacity="0.5">
      <animate attributeName="opacity" values="0.5;0;0.5" dur="1.1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1" cy="42" r="1.2" fill="#fbbf24" opacity="0.4">
      <animate attributeName="opacity" values="0.4;0;0.4" dur="0.9s" repeatCount="indefinite"/>
    </circle>
    <!-- Label -->
    <text x="17" y="73" fill="#f59e0b" font-family="'Segoe UI',sans-serif" font-size="9" text-anchor="middle" font-weight="600">CRASH</text>
  </g>

  <!-- Arrow 2 -->
  <g transform="translate(790, 65)">
    <line x1="0" y1="0" x2="40" y2="0" stroke="#475569" stroke-width="1.5" stroke-dasharray="4,3"/>
    <polygon points="40,-4 48,0 40,4" fill="#475569"/>
  </g>

  <!-- Step 3: File intact with shield/checkmark (right of scene) -->
  <g transform="translate(850, 40)" filter="url(#safeGlow)">
    <!-- File icon (intact) -->
    <rect x="0" y="0" width="48" height="60" rx="3" fill="#1e293b" stroke="#34d399" stroke-width="1.5"/>
    <!-- Folded corner -->
    <path d="M36,0 L48,12 L36,12 Z" fill="#0f3d2e" stroke="#34d399" stroke-width="1"/>
    <!-- Complete JSON lines -->
    <rect x="8" y="20" width="28" height="3" rx="1" fill="#34d399" opacity="0.8"/>
    <rect x="8" y="27" width="22" height="3" rx="1" fill="#34d399" opacity="0.8"/>
    <rect x="8" y="34" width="26" height="3" rx="1" fill="#34d399" opacity="0.8"/>
    <rect x="8" y="41" width="18" height="3" rx="1" fill="#34d399" opacity="0.8"/>
    <!-- Checkmark badge -->
    <circle cx="42" cy="52" r="10" fill="#065f46"/>
    <circle cx="42" cy="52" r="8" fill="#34d399"/>
    <path d="M37,52 L40,55 L47,48" fill="none" stroke="#0f172a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Label -->
    <text x="24" y="78" fill="#34d399" font-family="'Segoe UI',sans-serif" font-size="9" text-anchor="middle" font-weight="600">VALID JSON</text>
  </g>

  <!-- Explanatory subtext under the scene -->
  <text x="770" y="150" fill="#64748b" font-family="'Segoe UI',sans-serif" font-size="10" text-anchor="middle">temp file + fsync + os.replace = always valid</text>

  <!-- Thin accent line at bottom -->
  <rect x="0" y="214" width="1200" height="6" fill="#34d399" opacity="0.15" rx="0"/>
</svg>